<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f56b00" />
    <meta name="description" content="Интерактивный каталог инструмента по типам и этапам строительных работ" />
    <title>Инструмент и стройка — интерактивный каталог</title>
    <link rel="stylesheet" href="styles-v2.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-accent"></div>
      <div class="header-shell">
        <a class="brand" href="#/" aria-label="На главную каталога">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 40 40"><path d="M12 10h16v20H12zM16 14h8M16 20h8M16 26h5" /></svg>
          </span>
          <span class="brand-copy"><strong>Инструмент</strong><small>и стройка</small></span>
        </a>

        <button class="catalog-button" type="button" data-action="home-types">
          <span class="catalog-button-lines" aria-hidden="true"></span>
          Каталог
        </button>

        <div class="global-search" role="search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m16.5 16.5 4 4"></path></svg>
          <input id="global-search" type="search" placeholder="Найти инструмент или оснастку" autocomplete="off" aria-label="Поиск по каталогу" />
          <button id="search-clear" class="search-clear" type="button" aria-label="Очистить поиск">×</button>
          <div id="search-suggestions" class="search-suggestions" hidden></div>
        </div>

        <a class="header-help" href="#/configurator">
          <span>Не знаете, что выбрать?</span>
          <strong>Подобрать по задаче</strong>
        </a>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer class="site-footer">
      <div class="footer-shell">
        <div>
          <strong>Инструмент и стройка</strong>
          <p>Навигация по типам, этапам работ и потребностям пользователя.</p>
        </div>
        <a href="#/">Вернуться в каталог</a>
      </div>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="catalog-v2.js"></script>
    <script src="app-v2.js"></script>
  </body>
</html>
